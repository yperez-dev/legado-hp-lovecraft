  <main>
    <section class="introduccion">

      <div class="introduccion-img">
        <img src="assets/images/escritor-lovecraft.jpg" alt="Retrato de H. P. Lovecraft">
      </div>

      <div class="introduccion-cont">
        <h1> H.P. Lovecraft, el padre del horror cosmico</h1>
        <P>
          Hace 136 años nacia Howard Phillips Lovecraft el 20<br>
          de agosto de 1890 en Providencia, Rhode Island, fue<br>
          un escritor de obras que redefinieron el genero del<br>
          terror marcando el inicio de un perdurable legado.
        </P>

      <figure class="cita">
        <blockquote>
          <p>"La más angitua y fuerte emoción de la humanidad
              es el miedo, y el miedo más antiguo y más fuerte,
              es el miedo a lo desconocido."
          </p>
        </blockquote>
        <figcaption>— H.P. Lovecraft</figcaption>
      </figure>

      </div>

    </section>


  </main>

  <script src="./js/navbar.js"></script>
